name: Release

# Builds prebuilt binaries and attaches them to a GitHub Release when a
# version tag (v*) is pushed. Users install without a Rust toolchain via
# install.sh or a manual download.
#
# Linux builds are MUSL-static: no glibc floor, they run on any distro
# (including Alpine). macOS builds cover Apple Silicon and Intel.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Check tag matches Cargo.toml version
        run: |
          grep -q "^version = \"${GITHUB_REF_NAME#v}\"" Cargo.toml || {
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version"; exit 1; }
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="cursordump-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/cursordump" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          tar czf "$name.tar.gz" "$name"
          # sha256sum on Linux, shasum on macOS (identical output format).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          else
            shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: cursordump-${{ matrix.target }}
          path: |
            cursordump-*.tar.gz
            cursordump-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Publish release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: re-runs upload (with --clobber) instead of failing on
          # an existing release. Pre-release tags (v1.0.0-rc.1) are flagged.
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease" ;; esac
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber \
              cursordump-*.tar.gz cursordump-*.tar.gz.sha256
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CursorDump $GITHUB_REF_NAME" \
              --generate-notes --verify-tag $prerelease \
              cursordump-*.tar.gz cursordump-*.tar.gz.sha256
          fi
